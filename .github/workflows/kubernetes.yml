
name: 'kubernetes'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'kubernetes/**'
      - '.github/workflows/kubernetes.yml'
  pull_request:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"

permissions:
  contents: read

jobs:
  terraform:
    name: 'Build Terraform'
    runs-on: ubuntu-latest
    environment: production

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
        working-directory: ./${{ github.workflow }}

    steps:
      # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format
      run: terraform fmt -check



    ## Gather information about existing resources
    - name: Get VPC Info
      run: vpc_info=$(aws ec2 describe-vpcs| jq -r '.'); echo $vpc_info

    - name: Get VPC Info
      id: vpc_info
      run: echo "vpc_info=$(aws ec2 describe-vpcs| jq -r '.Vpcs.[0].VpcId')" >> "$GITHUB_OUTPUT"

    - name: debug
      run: echo ${{ steps.vpc_info.outputs.vpc_info }}

    - name: tfvars input
      run: echo 'vpc_id = ${{ steps.vpc_info.outputs.vpc_info }}' > pipeline.auto.tfvars




    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform init -var-file="pipeline.auto.tfvars"

    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -var-file="pipeline.auto.tfvars"

      # On push to "main", build or change infrastructure according to Terraform configuration files
      # Note: It is recommended to set up a required "strict" status check in your repository for "Terraform Cloud". See the documentation on "strict" required status checks for more information: https://help.github.com/en/github/administering-a-repository/types-of-required-status-checks
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -var-file="pipeline.auto.tfvars"

    - name: Terraform Destroy
      if: github.ref == 'refs/heads/main'
      run: terraform destroy -auto-approve -var-file="pipeline.auto.tfvars"
